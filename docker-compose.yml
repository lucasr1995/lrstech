version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lrstech-postgres
    environment:
      POSTGRES_USER: lrstech
      POSTGRES_PASSWORD: lrstech_secure_2026
      POSTGRES_DB: lrstech_db
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lrstech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lrstech"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lrstech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin4
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - lrstech_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lrstech-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://lrstech:lrstech_secure_2026@postgres:5432/lrstech_db
      JWT_SECRET: your_jwt_secret_key_change_in_production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - lrstech_network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lrstech-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - lrstech_network
    command: npm start

volumes:
  postgres_data:

networks:
  lrstech_network:
    driver: bridge
